<body>
  <h1 class="visually-hidden">Léon Pupier — Fullstack Software Developer</h1>

  <noscript>
    <div style="padding:2rem;color:#9efbb3;background:#0a0e0a;font-family:monospace;">
      <h2>Léon Pupier — Fullstack Software Developer</h2>
      <p>This is an interactive terminal portfolio. Please enable JavaScript to use it.</p>
      <p>Otherwise, reach me on <a href="https://www.linkedin.com/in/l%C3%A9on-pupier0420/">LinkedIn</a> or <a href="https://github.com/LeonPupier">GitHub</a>.</p>
    </div>
  </noscript>

  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="terminal-engine.jsx"></script>
  <script type="text/babel" src="animated-banner.jsx"></script>
  <script type="text/babel" src="terminal-output.jsx"></script>
  <script type="text/babel" src="matrix-rain.jsx"></script>
  <script type="text/babel" src="snake-game.jsx"></script>
  <script type="text/babel" src="terminal-app.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "scanlines": true,
      "flicker": true,
      "sound": true,
      "burnIn": true,
      "curvature": true,
      "theme": "green"
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      // Listen for `theme <name>` command from terminal
      React.useEffect(() => {
        const onSetTheme = (e) => setTweak("theme", e.detail);
        window.addEventListener("__set_theme", onSetTheme);
        return () => window.removeEventListener("__set_theme", onSetTheme);
      }, [setTweak]);

      return (
        <>
          <Terminal tweaks={tweaks} />

          <TweaksPanel title="Tweaks">
            <TweakSection label="Phosphor">
              <TweakRadio
                label="Color"
                value={tweaks.theme}
                onChange={v => setTweak("theme", v)}
                options={[
                  { value: "green",   label: "green" },
                  { value: "amber",   label: "amber" },
                  { value: "white",   label: "white" },
                ]}
              />
            </TweakSection>

            <TweakSection label="CRT Effects">
              <TweakToggle
                label="Scanlines"
                value={tweaks.scanlines}
                onChange={v => setTweak("scanlines", v)}
              />
              <TweakToggle
                label="Flicker"
                value={tweaks.flicker}
                onChange={v => setTweak("flicker", v)}
              />
              <TweakToggle
                label="Phosphor burn-in"
                value={tweaks.burnIn}
                onChange={v => setTweak("burnIn", v)}
              />
              <TweakToggle
                label="Screen curvature"
                value={tweaks.curvature}
                onChange={v => setTweak("curvature", v)}
              />
            </TweakSection>

            <TweakSection label="Audio">
              <TweakToggle
                label="Keyboard sounds"
                value={tweaks.sound}
                onChange={v => setTweak("sound", v)}
              />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
