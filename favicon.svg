<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#0a120a"/>
      <stop offset="70%" stop-color="#030503"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <rect x="2" y="2" width="60" height="60" rx="11" fill="none" stroke="#00ff66" stroke-opacity="0.32" stroke-width="1.2"/>
  <g filter="url(#glow)" fill="none" stroke="#6cffaa" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="14,20 30,32 14,44"/>
  </g>
  <rect filter="url(#glow)" x="34" y="40" width="18" height="6" rx="1" fill="#6cffaa"/>
</svg>
